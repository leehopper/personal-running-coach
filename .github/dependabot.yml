version: 2
updates:
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Major bumps blocked by transitive peer-dep ranges in the eslint ecosystem.
    # Revisit when typescript-eslint and @eslint-community/eslint-utils widen
    # their peer ranges to accept these majors.
    ignore:
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps):"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
