# .github/workflows/sonarqube.yml
name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Backend: .NET 10 via dotnet-sonarscanner
  # ──────────────────────────────────────────────
  backend-analysis:
    name: Backend analysis
    runs-on: ubuntu-latest
    # Job-level boolean flag (not the secret itself) so non-Sonar steps never
    # receive the token. The actual SONAR_TOKEN is scoped to the begin/end
    # steps that need it. SONAR_PRESENT is gates the if-conditions.
    env:
      SONAR_PRESENT: ${{ secrets.SONAR_TOKEN_BACKEND != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # full history required for new-code detection

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: '10.0.x'

      # Scanner v11.2+ auto-provisions a JRE — no setup-java needed
      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner --version 11.2.1

      # Sonar steps are skipped when SONAR_TOKEN is unavailable (Dependabot PRs,
      # forks, missing-secret drift). Job still runs build+test as a smoke check
      # and reports a passing status so branch-protection isn't blocked.
      - name: SonarScanner begin
        if: env.SONAR_PRESENT == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          dotnet sonarscanner begin \
            /k:"runcoach-backend" \
            /o:"leehopper" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="backend/TestResults/coverage.opencover.xml" \
            /d:sonar.sources="backend/src" \
            /d:sonar.tests="backend/tests" \
            /d:sonar.exclusions="backend/tests/eval-cache/**,**/*.generated.cs,**/Migrations/**,docs/**,.claude/**,backend/src/RunCoach.Api/Prompts/**,frontend/**" \
            /d:sonar.test.inclusions="backend/tests/**" \
            /d:sonar.cs.roslyn.ignoreIssues=false

      - name: Restore
        run: dotnet restore backend/RunCoach.slnx

      - name: Build
        run: dotnet build backend/RunCoach.slnx --no-restore --no-incremental

      - name: Test with coverage
        run: dotnet test backend/RunCoach.slnx --no-build /p:CollectCoverage=true -- --report-trx
        env:
          EVAL_CACHE_MODE: Replay

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-analysis-test-results
          path: |
            backend/tests/**/TestResults/**/*.trx
            backend/tests/**/TestResults/**/*.log
          retention-days: 7
          if-no-files-found: warn

      - name: SonarScanner end
        if: env.SONAR_PRESENT == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  # ──────────────────────────────────────────────
  # Frontend: React 19 + TypeScript via scan action
  # ──────────────────────────────────────────────
  frontend-analysis:
    name: Frontend analysis
    runs-on: ubuntu-latest
    env:
      SONAR_PRESENT: ${{ secrets.SONAR_TOKEN_FRONTEND != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # full history required for new-code detection

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test with coverage
        working-directory: frontend
        run: npm run test -- --coverage

      # Skipped when SONAR_TOKEN is unavailable (Dependabot PRs, forks, missing-secret
      # drift). Build+test above still runs as a smoke check.
      - name: SonarQube scan
        if: env.SONAR_PRESENT == 'true'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4  # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        with:
          projectBaseDir: frontend/
