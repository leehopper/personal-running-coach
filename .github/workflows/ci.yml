name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'global.json'
            frontend:
              - 'frontend/**'
            infra:
              - 'infra/otel/**'

  backend:
    name: Backend (build + test)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: runcoach
          POSTGRES_PASSWORD: runcoach_dev
          POSTGRES_DB: runcoach
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore backend/RunCoach.slnx
      - name: Restore dotnet tools
        run: dotnet tool restore
      - name: Build (Release; emits backend/openapi/swagger.json via EmitOpenApi target)
        # Release build runs the `EmitOpenApi` MSBuild target declared on
        # RunCoach.Api.csproj (DEC-066 / R-071), which invokes `dotnet swagger
        # tofile` to regenerate `backend/openapi/swagger.json`. The frontend
        # codegen pipeline (T03.1+) reads that file via npm scripts; running
        # the Release build here ensures every CI run regenerates the spec
        # before any downstream drift gate runs.
        run: dotnet build backend/RunCoach.slnx -c Release --no-restore
      - name: OpenAPI drift gate
        # Fails the build if the committed swagger.json differs from the
        # freshly-generated one, mirroring the frontend codegen drift gate
        # introduced by T03.1. Catches backend DTO changes that forget to
        # re-emit the spec before pushing.
        run: git diff --exit-code -- backend/openapi/swagger.json
      - name: Build (Debug; used by the test step below)
        run: dotnet build backend/RunCoach.slnx --no-restore
      - name: Test
        run: >-
          dotnet test
          --solution backend/RunCoach.slnx
          --no-build
          --results-directory backend/TestResults
          --report-trx
          --coverlet
          --coverlet-output-format opencover
          --coverlet-output-format cobertura
        env:
          EVAL_CACHE_MODE: Replay
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-test-results
          path: |
            backend/TestResults/**/*.trx
            backend/TestResults/**/*.log
          retention-days: 7
          if-no-files-found: warn
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          directory: backend/TestResults
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend (build + test)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Check contrast
        # WCAG-AA contrast gate (DEC-070). Recomputes the contrast ratio
        # of every semantic foreground/background token pair from the
        # committed values in src/index.css and fails the build if any
        # text pair drops below 4.5:1 or any non-text UI pair below 3:1.
        # Mirrors the `check-contrast` Lefthook pre-commit hook.
        run: npm run check-contrast
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: Test
        run: npm run test -- --coverage
        working-directory: frontend
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          directory: frontend/coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  codegen-drift:
    name: OpenAPI codegen drift gate
    # Runs whenever either side of the contract changed: a backend DTO edit
    # that forgets to regenerate the frontend Zod / RTK Query output fails
    # here, as does a frontend `codegen` invocation that the developer
    # forgot to re-run after editing `openapi-config.ts` or
    # `orval.config.ts`. Per DEC-066 / R-071 this is the load-bearing seam
    # that catches wire-shape drift before it ships.
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # v6.0.0
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Restore backend
        run: dotnet restore backend/RunCoach.slnx
      - name: Restore dotnet tools
        run: dotnet tool restore
      - name: Build backend (Release) — regenerates backend/openapi/swagger.json
        run: dotnet build backend/RunCoach.slnx -c Release --no-restore
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Run frontend codegen drift gate
        run: npm run codegen:check
        working-directory: frontend
      - name: Verify drift gate fails on a dirty generated file
        # Positive-failure test: proves the gate has teeth, not just that
        # it passes against an already-in-sync tree (DEC-066 / R-071).
        # The script appends a sentinel to a generated file, asserts
        # codegen:check exits non-zero, then reverts via `git checkout --`
        # on EXIT so the runner tree stays clean for any later steps.
        run: npm run test:codegen-drift
        working-directory: frontend

  security:
    name: Security (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Trivy secrets scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          exit-code: '1'

  infra-validate:
    name: Infra (OTel collector validate)
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    # Validates the OTel collector config against the collector binary so
    # broken YAML is caught in CI before it reaches any deployed environment.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Validate OTel collector config
        run: >-
          docker run --rm
          -v $PWD/infra/otel:/etc/otelcol
          otel/opentelemetry-collector-contrib:0.150.1
          validate --config=/etc/otelcol/otel-collector-config.yaml

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend, codegen-drift, security, infra-validate]
    if: always()
    env:
      BACKEND_RESULT: ${{ needs.backend.result }}
      FRONTEND_RESULT: ${{ needs.frontend.result }}
      CODEGEN_DRIFT_RESULT: ${{ needs.codegen-drift.result }}
      SECURITY_RESULT: ${{ needs.security.result }}
      INFRA_VALIDATE_RESULT: ${{ needs.infra-validate.result }}
    steps:
      - name: Check results
        run: |
          if [[ "$BACKEND_RESULT" =~ ^(failure|cancelled)$ || "$FRONTEND_RESULT" =~ ^(failure|cancelled)$ || "$CODEGEN_DRIFT_RESULT" =~ ^(failure|cancelled)$ || "$SECURITY_RESULT" =~ ^(failure|cancelled)$ || "$INFRA_VALIDATE_RESULT" =~ ^(failure|cancelled)$ ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped"
