# OpenTelemetry Collector config for the local dev observability overlay.
#
# Receivers: OTLP over gRPC (4317) and HTTP (4318) — accepts spans and metrics
# from the RunCoach API container.
#
# Exporters: OTLP to Jaeger's native OTLP ingest on port 4317 for traces;
# logging exporter as a fallback for metrics while a long-term metric backend
# is decided (Prometheus / SigNoz per R-050).
#
# The overlay only runs when the user opts in via
#   docker compose -f docker-compose.yml -f docker-compose.otel.yml up
# so the base stack remains slim.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
