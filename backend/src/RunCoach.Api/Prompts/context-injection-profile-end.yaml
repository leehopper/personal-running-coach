# context-injection-profile-end.yaml
# Version: 1.0.0
# Description: Positional placement variation — user profile moved to END position.
# Used for the positional placement experiment (Experiment 2).
# Tests the hypothesis that profile placement affects data accuracy.
# The v1 layout has profile at START; this variation puts it at END.
# Parseable by YamlDotNet.

version: "1.0.0"

total_token_budget: 15000

# Positional layout: START -> MIDDLE -> END
# Profile data is moved to the END section (near the user message)
# to test whether recency attention compensates for loss of stable prefix position.

sections:
  - name: "start"
    description: "Stable prefix — system prompt and computed data only (no profile)."
    position: "start"
    token_budget: 4500
    cacheable: true
    components:
      - key: "system_prompt"
        source: "coaching-v1.yaml#persona+safety+output_format+deterministic_guardrails"
        description: "Core coaching identity, safety rules, and output format instructions"
        token_estimate: 2800
        required: true

      - key: "training_paces"
        source: "TrainingPaces"
        description: "Deterministically computed training pace zones"
        token_estimate: 400
        required: true

      - key: "computed_metrics"
        source: "Deterministic computation layer"
        description: "ACWR, volume progression, recent load metrics"
        token_estimate: 200
        required: false

  - name: "middle"
    description: "Variable content — training history and plan context."
    position: "middle"
    token_budget: 4700
    cacheable: false
    components:
      - key: "training_history"
        source: "WorkoutSummary[] or WeekSummary[]"
        description: "Recent training history with Layer 1/Layer 2 summarization."
        token_estimate: 3500
        required: false

      - key: "relevant_plan_context"
        source: "Plan events or recent adaptations"
        description: "Recent plan changes or adaptations."
        token_estimate: 1200
        required: false

  - name: "end"
    description: "User profile + conversational section. Profile data placed here for recency attention."
    position: "end"
    token_budget: 5800
    cacheable: false
    components:
      - key: "user_profile"
        source: "UserProfile"
        description: "Runner biographical data — placed at end for recency attention test"
        token_estimate: 800
        required: true

      - key: "goal_state"
        source: "GoalState"
        description: "Current training goal"
        token_estimate: 300
        required: true

      - key: "fitness_estimate"
        source: "FitnessEstimate"
        description: "Current fitness level assessment"
        token_estimate: 300
        required: true

      - key: "conversation_history"
        source: "Recent conversation turns"
        description: "Recent conversation turns."
        token_estimate: 3200
        required: false
        max_turns: 10
        truncation_strategy: "oldest_first"

      - key: "current_user_message"
        source: "Current request"
        description: "The user's current message."
        token_estimate: 800
        required: true

token_estimation:
  method: "character_ratio"
  chars_per_token: 4
  safety_margin_percent: 10
