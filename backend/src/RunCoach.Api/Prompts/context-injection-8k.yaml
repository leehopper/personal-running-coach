# context-injection-8k.yaml
# Version: 1.0.0
# Description: Reduced token budget context injection layout (~8K tokens).
# Used for the token budget experiment (Experiment 1).
# Aggressively reduces middle and end section budgets.
# Parseable by YamlDotNet.

version: "1.0.0"

total_token_budget: 8000

# Positional layout: START -> MIDDLE -> END
# Same structure as v1 but with reduced budgets.

sections:
  - name: "start"
    description: "Stable prefix — high attention zone. Core context only at reduced budget."
    position: "start"
    token_budget: 4000
    cacheable: true
    components:
      - key: "system_prompt"
        source: "coaching-v1.yaml#persona+safety+output_format+deterministic_guardrails"
        description: "Core coaching identity, safety rules, and output format instructions"
        token_estimate: 2800
        required: true

      - key: "user_profile"
        source: "UserProfile"
        description: "Runner biographical data (condensed)"
        token_estimate: 500
        required: true

      - key: "goal_state"
        source: "GoalState"
        description: "Current training goal and optional race target"
        token_estimate: 200
        required: true

      - key: "fitness_estimate"
        source: "FitnessEstimate"
        description: "Current fitness level assessment with VDOT"
        token_estimate: 200
        required: true

      - key: "training_paces"
        source: "TrainingPaces"
        description: "Deterministically computed training pace zones"
        token_estimate: 300
        required: true

  - name: "middle"
    description: "Variable content — minimal at 8K budget. Weekly summaries only."
    position: "middle"
    token_budget: 1500
    cacheable: false
    components:
      - key: "training_history"
        source: "WeekSummary[]"
        description: "Recent training history as weekly summaries only (Layer 2). Max 2 weeks."
        token_estimate: 1000
        required: false
        summarization_layers:
          layer_2:
            name: "Weekly summary"
            description: "Aggregated weekly totals"
            tokens_per_week: 40
            max_weeks: 2

  - name: "end"
    description: "Conversational section — reduced at 8K budget."
    position: "end"
    token_budget: 2500
    cacheable: false
    components:
      - key: "conversation_history"
        source: "Recent conversation turns"
        description: "Most recent 3 turns only."
        token_estimate: 1700
        required: false
        max_turns: 3
        truncation_strategy: "oldest_first"

      - key: "current_user_message"
        source: "Current request"
        description: "The user's current message. Always included."
        token_estimate: 800
        required: true

token_estimation:
  method: "character_ratio"
  chars_per_token: 4
  safety_margin_percent: 10

overflow_strategy:
  description: "When assembled content exceeds 8K budget, apply reductions."
  steps:
    - action: "Remove training_history entirely"
      savings_estimate: 1000
    - action: "Truncate conversation to most recent 1 turn"
      savings_estimate: 1200
