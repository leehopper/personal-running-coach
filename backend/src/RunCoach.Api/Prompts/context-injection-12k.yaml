# context-injection-12k.yaml
# Version: 1.0.0
# Description: Medium token budget context injection layout (~12K tokens).
# Used for the token budget experiment (Experiment 1).
# Moderate reduction from the 15K v1 baseline.
# Parseable by YamlDotNet.

version: "1.0.0"

total_token_budget: 12000

# Positional layout: START -> MIDDLE -> END
# Same structure as v1 but with moderately reduced budgets.

sections:
  - name: "start"
    description: "Stable prefix — high attention zone. Full core context."
    position: "start"
    token_budget: 5500
    cacheable: true
    components:
      - key: "system_prompt"
        source: "coaching-v1.yaml#persona+safety+output_format+deterministic_guardrails"
        description: "Core coaching identity, safety rules, and output format instructions"
        token_estimate: 2800
        required: true

      - key: "user_profile"
        source: "UserProfile"
        description: "Runner biographical data"
        token_estimate: 800
        required: true

      - key: "goal_state"
        source: "GoalState"
        description: "Current training goal and optional race target"
        token_estimate: 300
        required: true

      - key: "fitness_estimate"
        source: "FitnessEstimate"
        description: "Current fitness level assessment with VDOT"
        token_estimate: 300
        required: true

      - key: "training_paces"
        source: "TrainingPaces"
        description: "Deterministically computed training pace zones"
        token_estimate: 400
        required: true

  - name: "middle"
    description: "Variable content — moderate budget. Weekly summaries for older, per-workout for recent."
    position: "middle"
    token_budget: 3000
    cacheable: false
    components:
      - key: "training_history"
        source: "WorkoutSummary[] or WeekSummary[]"
        description: "Recent training history. Layer 1 for most recent week, Layer 2 for older."
        token_estimate: 2500
        required: false
        summarization_layers:
          layer_1:
            name: "Per-workout detail"
            tokens_per_workout: 50
            max_weeks: 1
          layer_2:
            name: "Weekly summary"
            tokens_per_week: 40
            max_weeks: 3

  - name: "end"
    description: "Conversational section — moderately reduced."
    position: "end"
    token_budget: 3500
    cacheable: false
    components:
      - key: "conversation_history"
        source: "Recent conversation turns"
        description: "Most recent 5 turns."
        token_estimate: 2700
        required: false
        max_turns: 5
        truncation_strategy: "oldest_first"

      - key: "current_user_message"
        source: "Current request"
        description: "The user's current message. Always included."
        token_estimate: 800
        required: true

token_estimation:
  method: "character_ratio"
  chars_per_token: 4
  safety_margin_percent: 10

overflow_strategy:
  description: "When assembled content exceeds 12K budget, apply reductions."
  steps:
    - action: "Reduce training_history to Layer 2 only"
      savings_estimate: 1000
    - action: "Truncate oldest conversation turns"
      savings_estimate: 800
    - action: "Reduce training_history to most recent 2 weeks only"
      savings_estimate: 500
    - action: "Truncate conversation to most recent 3 turns"
      savings_estimate: 600
