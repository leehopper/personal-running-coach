sonar.projectKey=runcoach-frontend
sonar.organization=leehopper
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
# Generated codegen output (src/app/api/generated/**) and dev-only modules
# tree-shaken from production (src/dev-only/**) are excluded from analysis,
# coverage thresholds, and copy-paste duplication checks. Generated files
# repeat by design (Zod schemas mirror RTK Query types) and cannot be
# meaningfully unit-tested; dev-only code is `import.meta.env.DEV`-gated.
sonar.exclusions=dist/**,node_modules/**,coverage/**,.claude/**,docs/**,**/*.config.ts,**/*.config.js,src/app/api/generated/**,src/dev-only/**
sonar.javascript.exclusions=node_modules/**,dist/**,coverage/**

# Coverage exclusions: bootstrap wiring (main.tsx, otel.ts) and the
# last-trace-id singleton store are init-time integration code covered
# by the Playwright e2e suite rather than vitest unit tests.
sonar.coverage.exclusions=src/app/api/generated/**,src/dev-only/**,src/main.tsx,src/app/api/otel.ts,src/app/api/last-trace-id.ts

# Copy-paste duplication exclusions: generated Zod schemas legitimately
# repeat shapes that mirror the RTK Query types from the same OpenAPI source.
sonar.cpd.exclusions=src/app/api/generated/**

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.app.json

# Encoding
sonar.sourceEncoding=UTF-8
