sonar.projectKey=runcoach_runcoach-frontend
sonar.organization=runcoach
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=dist/**,node_modules/**,coverage/**,.claude/**,docs/**,**/*.config.ts,**/*.config.js
sonar.javascript.exclusions=node_modules/**,dist/**,coverage/**

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.app.json

# Encoding
sonar.sourceEncoding=UTF-8
