<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- SPLIT app icon: italic clay slash on an ink rounded-square field.
       Optical center of the slash bar sits ~3% above the viewBox center
       (rotation pivot y=47 of 100) so the mark reads balanced rather than
       centered-low, matching how an italic "/" glyph sits against a
       baseline. rx=20 gives a friendly rounded-square field for the
       non-maskable favicon/app-icon context. -->
  <rect width="100" height="100" rx="20" fill="#10140F" />
  <rect x="43" y="22" width="14" height="50" rx="7" fill="#D06A3B" transform="rotate(20 50 47)" />
</svg>
