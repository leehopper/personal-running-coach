pre-commit:
  parallel: true
  commands:
    dotnet-format:
      root: "backend/"
      glob: "*.cs"
      run: dotnet format RunCoach.slnx --include {staged_files} --no-restore
      stage_fixed: true
    eslint:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      root: "frontend/"
      glob: "*.{ts,tsx,css,json}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    dotnet-test:
      root: "backend/"
      glob: "*.cs"
      run: dotnet test RunCoach.slnx --no-restore --filter "Category!=Integration"
    typescript-check:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
