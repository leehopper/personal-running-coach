pre-commit:
  parallel: true
  commands:
    reject-docs-specs:
      glob: "docs/specs/**"
      run: |
        echo "ERROR: docs/specs/ is gitignored — do not stage these files."
        echo "Offending files: {staged_files}"
        exit 1
    dotnet-format:
      root: "backend/"
      glob: "*.cs"
      run: dotnet format RunCoach.slnx --include {staged_files} --no-restore
      stage_fixed: true
    eval-cache-ttl-fix:
      glob: "**/eval-cache/**/entry.json"
      run: bash backend/tests/scripts/fix-eval-cache-ttl.sh
      stage_fixed: true
    eval-cache-dedup:
      glob: "**/eval-cache/**"
      run: bash backend/tests/scripts/clean-eval-cache-duplicates.sh
    eslint:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      root: "frontend/"
      glob: "*.{ts,tsx,css,json}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  # Pre-push runs the fast feedback loop only: unit tests + eval (Replay) +
  # frontend type-check. Integration tests (Category=Integration) are filtered
  # out — they boot the shared Testcontainers Postgres + Marten + Wolverine
  # SUT (~3-5 min serial cost under DEC-063) and are gated to PR CI only,
  # which runs the full suite via `.github/workflows/ci.yml`.
  #
  # The dotnet-test hook also satisfies eval-cache integrity: every Eval test
  # runs in Replay mode under the same invocation; a stale cache surfaces as
  # a test failure here, with no need for a separate cache-replay hook.
  #
  # `parallel: false` serializes the hooks. `dotnet-test` and any future
  # build-touching hook race on MSBuild incremental-target stamp files
  # (e.g. GenerateMvcTestManifestTask writing
  # obj/Debug/net10.0/MvcTestingAppManifest.json → IOException under parallel
  # execution).
  parallel: false
  commands:
    dotnet-test:
      root: "backend/"
      glob: "*.cs"
      # Build, then invoke the xUnit v3 MTP test executable directly so
      # `-trait- "Category=Integration"` (single-hyphen, exclude-trait flag)
      # reaches the runner intact. Going via `dotnet test --filter` is a
      # silent no-op here — `dotnet test` emits the warning
      #   "MTP0001: VSTest-specific properties are set but will be ignored"
      # and runs all tests anyway, including integration tests that boot the
      # shared Testcontainers Postgres + Marten + Wolverine SUT (~3-5 min
      # under DEC-063 sequential). Direct invocation drops pre-push to ~3s.
      run: dotnet build RunCoach.slnx --no-restore --nologo && EVAL_CACHE_MODE=Replay tests/RunCoach.Api.Tests/bin/Debug/net10.0/RunCoach.Api.Tests -trait- "Category=Integration"
    typescript-check:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
