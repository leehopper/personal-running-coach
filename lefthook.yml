pre-commit:
  parallel: true
  commands:
    reject-docs-specs:
      glob: "docs/specs/**"
      run: |
        echo "ERROR: docs/specs/ is gitignored — do not stage these files."
        echo "Offending files: {staged_files}"
        exit 1
    dotnet-format:
      root: "backend/"
      glob: "*.cs"
      run: dotnet format RunCoach.slnx --include {staged_files} --no-restore
      stage_fixed: true
    eval-cache-ttl-fix:
      glob: "**/eval-cache/**/entry.json"
      run: bash backend/tests/scripts/fix-eval-cache-ttl.sh
      stage_fixed: true
    eval-cache-dedup:
      glob: "**/eval-cache/**"
      run: bash backend/tests/scripts/clean-eval-cache-duplicates.sh
    eslint:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      root: "frontend/"
      glob: "*.{ts,tsx,css,json}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  # Serial execution: dotnet-test and eval-cache-replay both invoke
  # `dotnet test RunCoach.slnx`, and concurrent MSBuild invocations race on
  # incremental-target stamp files (e.g. GenerateMvcTestManifestTask writing
  # obj/Debug/net10.0/MvcTestingAppManifest.json → IOException under parallel
  # execution). `parallel: false` serializes the hooks so any future pre-push
  # command that also builds stays safe by default. typescript-check is
  # frontend-only and does not race, but is cheap enough to run serially.
  parallel: false
  commands:
    dotnet-test:
      root: "backend/"
      glob: "*.cs"
      # MTP-native invocation per .NET SDK 10+: `--solution` flag (positional
      # slnx is rejected on SDK 10+), `--filter-not-trait "name=value"` for
      # xunit v3 trait filtering (the legacy VSTest `--filter "Category!=X"`
      # syntax is silently ignored by MTP and would still run integration
      # tests). Routing to MTP requires `test.runner` set in `global.json` at
      # the repo root — without that, SDK 10+ defaults to VSTest, which hangs
      # in MSBuild evaluation against an MTP-only test project.
      # `--report-trx` activates the trx reporter so the test summary lands on
      # stdout (matches CI invocation in .github/workflows/ci.yml).
      run: EVAL_CACHE_MODE=Replay dotnet test --solution RunCoach.slnx --filter-not-trait "Category=Integration" --report-trx
    eval-cache-replay:
      glob: "*.cs"
      run: bash backend/tests/scripts/prepush-eval-check.sh
    eval-cache-ttl-check:
      glob: "**/eval-cache/**/entry.json"
      run: bash backend/tests/scripts/check-eval-cache-ttl.sh
    typescript-check:
      root: "frontend/"
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
